<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samsung Launch</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      background: #000;
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: none;
    }

    .cursor-dot {
      position: fixed;
      pointer-events: none;
      z-index: 10002;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(220, 220, 220, 0.9);
      transform: translate(-50%, -50%);
      transition: transform 0.1s;
    }

    .cursor-ring {
      position: fixed;
      pointer-events: none;
      z-index: 10001;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.5px solid rgba(200, 200, 200, 0.4);
      transform: translate(-50%, -50%);
      transition: width 0.35s cubic-bezier(0.25, 0.8, 0.25, 1),
                  height 0.35s cubic-bezier(0.25, 0.8, 0.25, 1),
                  border-color 0.3s,
                  background 0.3s;
    }
    .cursor-ring.active {
      width: 56px;
      height: 56px;
      border-color: rgba(160, 200, 255, 0.5);
      background: rgba(160, 200, 255, 0.06);
    }

    .cursor-trail {
      position: fixed;
      pointer-events: none;
      z-index: 10000;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(180, 180, 180, 0.25);
      transform: translate(-50%, -50%);
    }

    .ripple {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid rgba(200, 200, 200, 0.4);
      transform: translate(-50%, -50%) scale(1);
      animation: rippleOut 0.6s ease-out forwards;
    }
    @keyframes rippleOut {
      to {
        transform: translate(-50%, -50%) scale(3.5);
        opacity: 0;
      }
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: block;
    }
    .end-screen {
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }
    .end-screen.show {
      opacity: 1;
      pointer-events: auto;
    }
    .end-screen h2 {
      font-family: 'Segoe UI', sans-serif;
      font-size: clamp(1.5rem, 4vw, 3rem);
      font-weight: 300;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .end-screen .creator {
      font-family: 'Segoe UI', sans-serif;
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: -2px;
    }
    .fb-link {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      padding: 12px 28px;
      border-radius: 50px;
      background: #1877F2;
      color: #fff;
      text-decoration: none;
      font-family: 'Segoe UI', sans-serif;
      font-size: clamp(1rem, 2vw, 1.4rem);
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .fb-link:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(24, 119, 242, 0.5);
    }
    .fb-link svg {
      width: 22px;
      height: 22px;
      fill: #fff;
    }
  </style>
</head>

<body>

  <div class="cursor-dot" id="dot"></div>
  <div class="cursor-ring" id="ring"></div>
  <div class="cursor-trail" id="trail"></div>

  <script>
    (function () {
      const video = document.getElementById('vid');
      const dot = document.getElementById('dot');
      const ring = document.getElementById('ring');
      const trail = document.getElementById('trail');
      let scrollTimer = null;
      let isPlaying = false;

      // Mouse positions with spring physics
      let mx = 0, my = 0;
      let dx = 0, dy = 0;  // dot
      let rx = 0, ry = 0;  // ring
      let lx = 0, ly = 0;  // trail

      document.addEventListener('mousemove', function (e) {
        mx = e.clientX;
        my = e.clientY;
      });

      // Smooth animation with different easing for each element
      (function animate() {
        // Dot follows fast
        dx += (mx - dx) * 0.35;
        dy += (my - dy) * 0.35;
        dot.style.left = dx + 'px';
        dot.style.top = dy + 'px';

        // Ring follows medium
        rx += (mx - rx) * 0.12;
        ry += (my - ry) * 0.12;
        ring.style.left = rx + 'px';
        ring.style.top = ry + 'px';

        // Trail follows slow
        lx += (mx - lx) * 0.06;
        ly += (my - ly) * 0.06;
        trail.style.left = lx + 'px';
        trail.style.top = ly + 'px';

        requestAnimationFrame(animate);
      })();

      // Spawn ripple on scroll
      function spawnRipple() {
        const r = document.createElement('div');
        r.className = 'ripple';
        r.style.left = rx + 'px';
        r.style.top = ry + 'px';
        document.body.appendChild(r);
        setTimeout(() => r.remove(), 600);
      }

      // Fullscreen on first click
      document.addEventListener('click', function goFS() {
        const el = document.documentElement;
        (el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen).call(el);
        document.removeEventListener('click', goFS);
      });

      // Wheel down only — scroll up fully blocked — with acceleration
      let scrollSpeed = 0;
      let accelTimer = null;

      window.addEventListener('wheel', function (e) {
        e.preventDefault();
        if (!video.duration) return;
        if (e.deltaY <= 0) return;

        // Acceleration: smooth buildup (0.5x to 4x)
        scrollSpeed = Math.min(scrollSpeed + Math.abs(e.deltaY) * 0.01, 4);
        const rate = Math.max(0.5, Math.min(4, scrollSpeed));

        // Scroll DOWN — play video forward
        ring.classList.add('active');
        spawnRipple();

        video.playbackRate = rate;
        if (!isPlaying) {
          isPlaying = true;
          video.play().catch(() => { });
        }

        // Decelerate smoothly
        clearInterval(accelTimer);
        accelTimer = setInterval(function () {
          scrollSpeed *= 0.9;
          if (scrollSpeed < 1) {
            scrollSpeed = 0;
            clearInterval(accelTimer);
          }
          if (isPlaying) video.playbackRate = Math.max(1, scrollSpeed);
        }, 50);

        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(function () {
          isPlaying = false;
          video.pause();
          ring.classList.remove('active');
          scrollSpeed = 0;
          clearInterval(accelTimer);
        }, 200);
      }, { passive: false });

      // Show end screen when video finishes
      video.addEventListener('ended', function () {
        document.getElementById('endScreen').classList.add('show');
      });
    })();
  </script>
</body>
